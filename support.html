    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { heading: ['"Space Grotesk"','sans-serif'], body: ['"DM Sans"','sans-serif'] },

        }

  <style>
    body { font-family: 'DM Sans', sans-serif; }
    .glass-strong { background: rgba(255,255,255,0.75); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border: 1px solid rgba(212,223,208,0.7); }
    .gradient-text { background: linear-gradient(135deg,#3fa60a,#56d012); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .gradient-btn { background: linear-gradient(135deg,#3fa60a,#56d012); color:#fff; transition: all 0.3s ease; }
    .gradient-btn:hover { box-shadow: 0 8px 30px rgba(63,166,10,0.35); transform: translateY(-2px); }
    .blob-1 { position:fixed;top:-200px;left:-150px;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(86,208,18,0.12),transparent 70%);z-index:-1;pointer-events:none; }

    </div>

      <!-- Icon -->
      <div class="w-16 h-16 rounded-2xl bg-brand-100 flex items-center justify-center mx-auto">
        <svg class="w-8 h-8 text-brand-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>

      </p>

      <!-- Support URL -->
      <a href="mailto:sahadeep125@gmail.com" class="gradient-btn inline-flex items-center gap-2.5 font-semibold px-8 py-4 rounded-2xl">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>

        <div class="flex items-center gap-3">

          <span class="font-heading font-bold gradient-text">Invoiso</span>
        </div>
        <div class="flex gap-6 text-sm text-txt-2">
          <a href="/privacy.html" class="hover:text-txt transition-colors">Privacy</a>
